site_name: Guides Not Included
site_description: >-
  An archived copy of guidesnotincluded.com — Oxygen Not Included builds,
  guides, and resources. Restored from the Internet Archive.
site_url: https://ahembree.github.io/guidesnotincluded/
repo_url: https://github.com/ahembree/guidesnotincluded
repo_name: ahembree/guidesnotincluded
copyright: >-
  Guides © Some Random Finn (guidesnotincluded.com), licensed
  <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a>.
  Non-commercial archive via the Internet Archive — game imagery © Klei
  Entertainment. See <a href="attribution/">Attribution &amp; licensing</a>.

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox:        # click an image to open it full-screen in a closable modal
      touchNavigation: true
      loop: false
      effect: zoom
      zoomable: true
      draggable: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Grouped navigation. Pages live flat in docs/ (the crawler writes them there);
# this only controls how they are organised in the sidebar. guides.md (empty in
# the archive) and home.md (a duplicate of the index/home page) are intentionally
# left out of the nav — they are still built and reachable by direct link.
