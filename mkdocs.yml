site_name: Guides Not Included
site_description: >-
  An archived copy of guidesnotincluded.com — Oxygen Not Included builds,
  guides, and resources. Restored from the Internet Archive.
site_url: https://ahembree.github.io/guidesnotincluded/
repo_url: https://github.com/ahembree/guidesnotincluded
repo_name: ahembree/guidesnotincluded
copyright: >-
  Content archived from guidesnotincluded.com via the Internet Archive.
  Original content belongs to its respective author(s).

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Nav is generated automatically from the docs/ tree. Once the crawl is done,
# you can pin an explicit `nav:` here to control ordering if desired.
